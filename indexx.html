<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">

<!-- WAJIB BIAR MOBILE NORMAL -->
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Send The Song</title>

<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100 min-h-screen flex items-center justify-center px-4">

<div class="bg-white w-full max-w-md p-6 rounded-2xl shadow-lg">

<h1 class="text-2xl font-bold text-center mb-6">
Send The Song 🎵
</h1>

<input id="nama" 
placeholder="Your name"
class="w-full p-3 border rounded-xl mb-4 text-sm">

<input id="to" 
placeholder="To (their name)"
class="w-full p-3 border rounded-xl mb-4 text-sm">

<input id="lagu" 
placeholder="Song title"
class="w-full p-3 border rounded-xl mb-4 text-sm">

<input id="artist" 
placeholder="Artist"
class="w-full p-3 border rounded-xl mb-4 text-sm">

<textarea id="pesan"
placeholder="Write your message..."
class="w-full p-3 border rounded-xl mb-4 text-sm resize-none"
rows="3"></textarea>

<button onclick="submitForm()"
class="w-full bg-purple-600 hover:bg-purple-700 
text-white py-3 rounded-xl font-semibold transition text-sm">
Send 💌
</button>

</div>

<script>
function submitForm(){
alert("Ini contoh UI responsive dulu ya 🔥");
}
</script>

</body>
</html>
