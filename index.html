<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Send The Song</title>

<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100 min-h-screen flex items-center justify-center px-4">

<div class="w-full max-w-4xl bg-white rounded-2xl shadow-xl p-6 md:p-10">

<h1 class="text-3xl md:text-2xl font-bold text-center mb-8">
Send The Song 🎵
</h1>

<div class="grid md:grid-cols-2 gap-6">

<div>
<label class="block mb-2 font-semibold text-lg md:text-base">
Your Name
</label>
<input id="nama"
class="w-full p-4 md:p-3 border rounded-xl text-lg md:text-base"
placeholder="Your name">
</div>

<div>
<label class="block mb-2 font-semibold text-lg md:text-base">
To
</label>
<input id="to"
class="w-full p-4 md:p-3 border rounded-xl text-lg md:text-base"
placeholder="Their name">
</div>

</div>

<div class="mt-6">
<label class="block mb-2 font-semibold text-lg md:text-base">
Song Title
</label>
<input id="lagu"
class="w-full p-4 md:p-3 border rounded-xl text-lg md:text-base"
placeholder="Song name">
</div>

<div class="mt-6">
<label class="block mb-2 font-semibold text-lg md:text-base">
Artist
</label>
<input id="artist"
class="w-full p-4 md:p-3 border rounded-xl text-lg md:text-base"
placeholder="Artist name">
</div>

<div class="mt-6">
<label class="block mb-2 font-semibold text-lg md:text-base">
Message
</label>
<textarea id="pesan"
rows="4"
class="w-full p-4 md:p-3 border rounded-xl text-lg md:text-base resize-none"
placeholder="Write your message..."></textarea>
</div>

<button onclick="submitForm()"
class="w-full mt-8 bg-purple-600 hover:bg-purple-700 
text-white py-4 md:py-3 rounded-xl 
text-lg md:text-base font-semibold transition">
Send 💌
</button>

</div>

<script>
function submitForm(){
alert("Responsive version aktif 🔥");
}
</script>

</body>
</html>
